version: "3.9"

services:
  api:
    build: .
    container_name: churn-clv-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHURN_API_KEY=${CHURN_API_KEY:-}
      - CHURN_LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
